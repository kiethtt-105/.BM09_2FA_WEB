<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>App B — Đăng nhập</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-blue-50 flex items-center justify-center p-4">

<div class="w-full max-w-md">

 

  {% if messages %}
  {% for msg in messages %}
  <div class="mb-4 p-4 rounded-xl
    {% if msg.tags == 'error' %}bg-red-50 text-red-600 border border-red-200
    {% else %}bg-green-50 text-green-600 border border-green-200{% endif %}">
    <i class="fas fa-{% if msg.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %} mr-2"></i>
    {{ msg }}
  </div>
  {% endfor %}
  {% endif %}

  <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- Tab chọn Đăng nhập / Đăng ký -->
    <div class="flex border-b border-slate-100">
      <button onclick="switchTab('login')" id="tab-login"
        class="flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition">
        Đăng nhập
      </button>
      <button onclick="switchTab('register')" id="tab-register"
        class="flex-1 py-4 text-sm font-bold text-slate-400 border-b-2 border-transparent transition">
        Đăng ký
      </button>
    </div>

    <div class="p-8">

      <!-- FORM ĐĂNG NHẬP -->
      <div id="form-login">
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="action" value="login">
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
              Tên đăng nhập
            </label>
            <input type="text" name="username" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition text-sm">
          </div>
          <div class="mb-6">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
              Mật khẩu
            </label>
            <input type="password" name="password" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition text-sm">
          </div>
          <button type="submit"
            class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition text-sm">
            Đăng nhập
          </button>
        </form>
      </div>

      <!-- FORM ĐĂNG KÝ -->
      <div id="form-register" class="hidden">
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="action" value="register">
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
              Tên đăng nhập
            </label>
            <input type="text" name="username" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition text-sm">
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
              Email
            </label>
            <input type="email" name="email"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition text-sm">
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
              Mật khẩu
            </label>
            <input type="password" name="password" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition text-sm">
          </div>
          <div class="mb-6">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
              Nhập lại mật khẩu
            </label>
            <input type="password" name="password2" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition text-sm">
          </div>
          <button type="submit"
            class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition text-sm">
            Tạo tài khoản
          </button>
        </form>
      </div>

      <!-- DIVIDER -->
      <div class="flex items-center my-6">
        <div class="flex-1 h-px bg-slate-100"></div>
        <span class="px-4 text-xs text-slate-400 font-medium">Hoặc tiếp tục với</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <!-- NÚT SSO HUIT -->
      <a href="https://spellable-sciuroid-maybell.ngrok-free.dev//sso/send/"
        class="flex items-center justify-center gap-3 w-full py-3 border-2 border-blue-200 hover:border-blue-400 hover:bg-blue-50 rounded-xl transition text-sm font-bold text-blue-600">
        <div class="w-6 h-6 bg-blue-600 rounded-lg flex items-center justify-center">
          <i class="fas fa-graduation-cap text-white text-xs"></i>
        </div>
        Tài khoản HUIT (Web HUIT)
      </a>

      <p class="text-center text-xs text-slate-400 mt-4">
        Đăng nhập bằng tài khoản HUIT sẽ tự động tạo/liên kết tài khoản
      </p>

    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  const formLogin    = document.getElementById('form-login');
  const formRegister = document.getElementById('form-register');
  const tabLogin     = document.getElementById('tab-login');
  const tabRegister  = document.getElementById('tab-register');

  if (tab === 'login') {
    formLogin.classList.remove('hidden');
    formRegister.classList.add('hidden');
    tabLogin.className    = 'flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition';
    tabRegister.className = 'flex-1 py-4 text-sm font-bold text-slate-400 border-b-2 border-transparent transition';
  } else {
    formLogin.classList.add('hidden');
    formRegister.classList.remove('hidden');
    tabRegister.className = 'flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition';
    tabLogin.className    = 'flex-1 py-4 text-sm font-bold text-slate-400 border-b-2 border-transparent transition';
  }
}
</script>
</body>
</html>
