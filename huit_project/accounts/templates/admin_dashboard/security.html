<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> HUIT Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-200">

<div class="flex min-h-screen">
    <!-- Sidebar cố định -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 fixed h-full overflow-y-auto">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-11 h-11 bg-violet-600 rounded-2xl flex items-center justify-center text-3xl font-bold text-white">H</div>
            <h1 class="text-3xl font-bold">HUIT</h1>
        </div>

        <nav class="space-y-1">
            <a href="/admin-dashboard/" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl text-zinc-300">📊 Tổng quan</a>
            <a href="/admin-dashboard/users/" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl text-zinc-300">👥 Quản lý Người dùng</a>
            <a href="/admin-dashboard/otp-history/" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl text-zinc-300">🔑 Lịch sử OTP</a>

            <a href="/admin-dashboard/security/" class="flex items-center gap-3 px-5 py-4 bg-violet-600/10 text-violet-400 rounded-2xl font-bold border border-violet-600/20">🛡️ Cảnh báo Bảo mật</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 ml-72 p-10">
        <div class="flex items-center gap-4 mb-8">
            <i class="fas fa-shield-alt text-4xl text-red-500"></i>
            <h1 class="text-3xl font-bold">Cảnh báo Bảo mật</h1>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8 text-zinc-400">
            <p>Nội dung trang Cảnh báo Bảo mật sẽ được hiển thị ở đây.</p>
            <p class="mt-4">Hiện tại chưa có dữ liệu cảnh báo.</p>
        </div>
    </div>

</html>
