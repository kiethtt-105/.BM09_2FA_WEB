<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác nhận OTP · HUIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg:       #080c14;
  --surface:  #0f1623;
  --surface2: #161e2e;
  --border:   rgba(255,255,255,0.07);
  --accent:   #6366f1;
  --accent2:  #22d3ee;
  --green:    #10b981;
  --red:      #ef4444;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --font:     'Outfit', sans-serif;
  --mono:     'DM Mono', monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:var(--font);
  background:var(--bg);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  color:var(--text); padding:24px;
}
body::before {
  content:''; position:fixed;
  width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,.1) 0%,transparent 70%);
  top:-150px; left:-150px; pointer-events:none; z-index:0;
}
body::after {
  content:''; position:fixed;
  width:400px; height:400px; border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);
  bottom:-100px; right:-100px; pointer-events:none; z-index:0;
}

.card {
  position:relative; z-index:1;
  width:100%; max-width:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:44px 36px;
  box-shadow:0 0 0 1px rgba(16,185,129,.08),0 40px 80px rgba(0,0,0,.5);
  animation:rise .5s cubic-bezier(.16,1,.3,1) both;
  text-align:center;
}
@keyframes rise {
  from { opacity:0; transform:scale(.93) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.icon-ring {
  width:72px; height:72px; margin:0 auto 20px;
  background:linear-gradient(135deg,var(--green),#059669);
  border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  font-size:30px;
  box-shadow:0 8px 24px rgba(16,185,129,.3);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow:0 8px 24px rgba(16,185,129,.3); }
  50%      { box-shadow:0 8px 40px rgba(16,185,129,.55); }
}

h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
.subtitle {
  font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:10px;
}
.email-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:6px 12px;
  font-family:var(--mono); font-size:12px; color:var(--accent2);
  margin-bottom:24px;
}
.expiry-note {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(245,158,11,.08); border:1px solid rgba(245,158,11,.2);
  border-radius:8px; padding:5px 10px;
  font-size:11px; color:#fcd34d; font-family:var(--mono);
  margin-bottom:24px;
}

/* Steps */
.steps { display:flex; align-items:center; margin-bottom:28px; }
.step { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.step-dot {
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; font-family:var(--mono);
  border:2px solid var(--border); color:var(--muted); background:var(--surface2);
}
.step.done .step-dot {
  border-color:var(--green); background:var(--green); color:#fff;
}
.step.active .step-dot {
  border-color:var(--green); color:var(--green);
  box-shadow:0 0 10px rgba(16,185,129,.3);
}
.step-label { font-size:9px; color:var(--muted); font-family:var(--mono); }
.step-line { flex:1; height:1px; background:var(--border); margin:0 -1px; margin-bottom:14px; }
.step-line.done { background:var(--green); }

/* OTP boxes */
.otp-row {
  display:flex; justify-content:center; gap:10px; margin-bottom:24px;
}
.otp-box {
  width:52px; height:62px;
  background:var(--surface2);
  border:2px solid var(--border);
  border-radius:14px;
  font-size:1.8rem; font-weight:700; font-family:var(--mono);
  text-align:center; color:var(--text); outline:none;
  transition:border .2s, box-shadow .2s, background .2s;
}
.otp-box:focus {
  border-color:var(--green);
  box-shadow:0 0 0 4px rgba(16,185,129,.15);
  background:#0d1f16;
}
.otp-box.filled {
  border-color:rgba(16,185,129,.5);
  background:#0d1f16;
}

/* Messages */
.msg {
  padding:10px 14px; border-radius:10px; font-size:13px;
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
  text-align:left;
}
.msg-success { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); color:#6ee7b7; }
.msg-error   { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.25);  color:#fca5a5; }

/* Buttons */
.btn {
  width:100%; padding:13px; border:none; border-radius:12px;
  font-size:14px; font-weight:700; font-family:var(--font);
  cursor:pointer; display:flex; align-items:center;
  justify-content:center; gap:8px;
  transition:transform .15s, box-shadow .15s, opacity .15s;
  margin-bottom:10px;
}
.btn:last-child { margin-bottom:0; }
.btn:hover:not(:disabled) { transform:translateY(-2px); }
.btn:active:not(:disabled) { transform:translateY(0); }
.btn:disabled { opacity:.4; cursor:not-allowed; }

.btn-primary {
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;
  box-shadow:0 4px 20px rgba(16,185,129,.3);
}
.btn-primary:hover:not(:disabled) { box-shadow:0 8px 28px rgba(16,185,129,.45); }

.btn-ghost {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--muted); font-size:13px;
}
.btn-ghost:hover:not(:disabled) { border-color:rgba(255,255,255,.15); color:var(--text); }

/* Countdown */
.countdown {
  margin-top:14px; font-size:12px; color:var(--muted);
  font-family:var(--mono);
}
.countdown .timer { color:var(--green); font-weight:700; }
.countdown.warning .timer { color:#f59e0b; }
.countdown.expired .timer { color:var(--red); }

.back-link {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:20px; font-size:12px; color:var(--muted);
  text-decoration:none; font-family:var(--mono);
  transition:color .15s;
}
.back-link:hover { color:var(--text); }
</style>
</head>
<body>
<div class="card">
  <!-- Step indicator -->
  <div class="steps">
    <div class="step done">
      <div class="step-dot"><i class="fa fa-check" style="font-size:10px"></i></div>
      <div class="step-label">Thông tin</div>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-dot">2</div>
      <div class="step-label">OTP</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot">3</div>
      <div class="step-label">Hoàn tất</div>
    </div>
  </div>

  <div class="icon-ring">📬</div>
  <h2>Xác nhận Email</h2>
  <p class="subtitle">Mã OTP 6 số đã được gửi đến</p>
  <div class="email-badge">
    <i class="fa fa-envelope"></i> {{ email }}
  </div>
  <br>
  <div class="expiry-note">
    <i class="fa fa-clock"></i> Mã có hiệu lực <strong>10 phút</strong>
  </div>

  {% if messages %}
    {% for message in messages %}
    <div class="msg {% if 'success' in message.tags %}msg-success{% else %}msg-error{% endif %}">
      <i class="fas {% if 'success' in message.tags %}fa-check-circle{% else %}fa-circle-xmark{% endif %}"></i>
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}

  <!-- OTP Form -->
  <form method="POST" id="otp-form">
    {% csrf_token %}
    <div class="otp-row" id="otp-row">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
    </div>
    <input type="hidden" name="otp_code" id="hidden-otp">

    <button type="submit" class="btn btn-primary" id="confirm-btn" disabled>
      <i class="fa fa-shield-check"></i> Xác nhận & Kích hoạt tài khoản
    </button>
  </form>

  <!-- Resend form -->
  <form method="POST" id="resend-form" style="margin-top:10px;">
    {% csrf_token %}
    <input type="hidden" name="action" value="resend">
    <button type="submit" class="btn btn-ghost" id="resend-btn" disabled>
      <i class="fa fa-rotate-right"></i> Gửi lại mã OTP
    </button>
  </form>

  <div class="countdown" id="countdown">
    Gửi lại sau: <span class="timer" id="timer">300</span>s
  </div>

  <a href="/register/" class="back-link">
    <i class="fa fa-arrow-left"></i> Quay lại đăng ký
  </a>
</div>

<script>
// ── OTP boxes ──────────────────────────────────────────────────
const boxes      = document.querySelectorAll('.otp-box');
const hidden     = document.getElementById('hidden-otp');
const confirmBtn = document.getElementById('confirm-btn');

boxes.forEach((box, idx) => {
  box.addEventListener('input', () => {
    box.value = box.value.replace(/\D/g,'').slice(-1);
    box.classList.toggle('filled', !!box.value);
    syncOTP();
    if (box.value && idx < 5) boxes[idx+1].focus();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && idx > 0) {
      boxes[idx-1].value = '';
      boxes[idx-1].classList.remove('filled');
      boxes[idx-1].focus();
      syncOTP();
    }
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const pasted = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
    [...pasted.slice(0,6)].forEach((ch,i) => {
      if (boxes[i]) { boxes[i].value=ch; boxes[i].classList.add('filled'); }
    });
    syncOTP();
    const next = Math.min(pasted.length, 5);
    boxes[next].focus();
  });
});

function syncOTP() {
  let otp = '';
  boxes.forEach(b => otp += b.value);
  hidden.value = otp;
  confirmBtn.disabled = otp.length < 6;
}

boxes[0].focus();

// ── Countdown ──────────────────────────────────────────────────
let timeLeft = 600;
const timerEl      = document.getElementById('timer');
const countdownEl  = document.getElementById('countdown');
const resendBtn    = document.getElementById('resend-btn');

const tick = setInterval(() => {
  timeLeft--;
  timerEl.textContent = timeLeft;
  if (timeLeft <= 120) countdownEl.classList.add('warning');
  if (timeLeft <= 0) {
    clearInterval(tick);
    countdownEl.classList.add('expired');
    countdownEl.innerHTML = '<span class="timer"><i class="fa fa-times-circle"></i> Mã đã hết hạn — hãy gửi lại</span>';
    resendBtn.disabled = false;
    confirmBtn.disabled = true;
  }
}, 1000);

// Enable resend after 15s
setTimeout(() => { resendBtn.disabled = false; }, 15000);
</script>
</body>
</html>
