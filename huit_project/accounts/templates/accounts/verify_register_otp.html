<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác nhận OTP · HUIT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#04080f;--bg1:#080f1c;--bg2:#0d1626;
  --border:rgba(37,99,235,0.14);--border2:rgba(37,99,235,0.30);
  --blue:#2563eb;--blue2:#3b82f6;
  --text:#e2e8f0;--muted:#475569;--muted2:#64748b;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;-webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 600px 400px at 50% 20%,rgba(37,99,235,0.06) 0%,transparent 70%);
}
.card{
  position:relative;z-index:1;width:100%;max-width:400px;
  background:var(--bg1);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;text-align:center;
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:flex-start;}
.brand-dot{width:8px;height:8px;background:var(--blue);border-radius:50%;}
.brand-name{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;}
.brand-name strong{color:var(--blue2);}

.steps{display:flex;align-items:center;margin-bottom:28px;}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.step-n{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:var(--mono);
  border:1px solid var(--border);color:var(--muted);background:var(--bg2);
}
.step.done .step-n{border-color:var(--blue);background:var(--blue);color:#fff;font-size:10px;}
.step.active .step-n{border-color:var(--blue);color:var(--blue);background:rgba(37,99,235,.08);}
.step-label{font-size:10px;color:var(--muted);font-family:var(--mono);}
.step-line{flex:1;height:1px;background:var(--border);margin:0 -1px;margin-bottom:14px;}
.step-line.done{background:var(--blue);opacity:.4;}

.icon-wrap{
  width:60px;height:60px;margin:0 auto 20px;
  background:rgba(37,99,235,.10);border:1px solid var(--border2);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:26px;
}
h2{font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
.email-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;padding:5px 12px;
  font-family:var(--mono);font-size:12px;color:var(--blue2);
  margin-bottom:8px;
}
.expiry{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);
  border-radius:6px;padding:4px 10px;
  font-size:11px;color:#fcd34d;font-family:var(--mono);margin-bottom:22px;
}

.otp-row{display:flex;justify-content:center;gap:8px;margin:18px 0;}
.otp-box{
  width:48px;height:58px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  font-size:1.7rem;font-weight:700;font-family:var(--mono);
  text-align:center;color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.otp-box:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.otp-box.filled{border-color:rgba(124,111,255,.35);}

.msg{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;text-align:left;}
.msg-success{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18);color:#6ee7b7;}
.msg-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);color:#fca5a5;}

.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px 18px;border:none;border-radius:10px;
  font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .15s;margin-bottom:8px;
}
.btn:hover:not(:disabled){opacity:.85;transform:translateY(-1px);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;border:none;}
.btn-ghost{background:var(--bg2);border:1px solid var(--border);color:var(--muted2);}
.btn-ghost:hover:not(:disabled){border-color:var(--border2);color:var(--text);}

.countdown{margin-top:12px;font-size:12px;color:var(--muted);font-family:var(--mono);}
.timer{color:var(--blue2);font-weight:700;}
.countdown.warning .timer{color:#f59e0b;}
.countdown.expired .timer{color:#ef4444;}

.back{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:12px;color:var(--muted);text-decoration:none;font-family:var(--mono);}
.back:hover{color:var(--text);}

  /* ── BLUE PRO OVERRIDES ── */
  body::before {
    background:
      radial-gradient(ellipse 700px 400px at 20% -10%, rgba(37,99,235,0.09) 0%, transparent 65%),
      radial-gradient(ellipse 400px 300px at 80% 100%, rgba(59,130,246,0.05) 0%, transparent 65%);
  }
  /* Sharper card border with subtle top glow */
  .card, .wrap, .panel, .list-card, .table-card, .sidebar, .main {
    border-color: rgba(37,99,235,0.16) !important;
    box-shadow: 0 1px 0 0 rgba(37,99,235,0.12) inset, 0 24px 48px -12px rgba(2,6,14,0.6);
  }
  /* Primary button — blue gradient */
  .btn-primary {
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%) !important;
    box-shadow: 0 2px 12px rgba(37,99,235,0.30);
    letter-spacing: 0.01em;
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 4px 20px rgba(37,99,235,0.45);
    opacity: 1 !important;
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%) !important;
  }
  /* Ghost button */
  .btn-ghost, .back-link, .back-btn {
    background: rgba(13,22,38,0.7) !important;
    border-color: rgba(37,99,235,0.16) !important;
    backdrop-filter: blur(4px);
  }
  .btn-ghost:hover, .back-link:hover, .back-btn:hover {
    border-color: rgba(37,99,235,0.35) !important;
    background: rgba(37,99,235,0.08) !important;
    color: var(--blue3) !important;
  }
  /* Input focus */
  input[type=text]:focus, input[type=email]:focus,
  input[type=tel]:focus, input[type=password]:focus,
  .otp-box:focus {
    border-color: var(--blue) !important;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.18) !important;
  }
  /* Active nav item */
  .nav-item.active {
    background: rgba(37,99,235,0.12) !important;
    color: var(--blue3) !important;
    border-color: rgba(37,99,235,0.22) !important;
  }
  .nav-item:hover { 
    background: rgba(37,99,235,0.07) !important; 
    color: var(--text) !important;
  }
  /* Brand dot */
  .brand-dot, .logo-dot { background: var(--blue2) !important; }
  /* OTP box filled state */
  .otp-box.filled { border-color: rgba(37,99,235,0.45) !important; }
  /* Method tabs in verify_2fa */
  .method.active {
    border-color: var(--blue) !important;
    color: var(--blue3) !important;
    background: rgba(37,99,235,0.10) !important;
  }
  /* Badge online pulse */
  .dot-pulse, .dot-live { background: var(--success) !important; }
  /* Toggle checked */
  .toggle input:checked + .toggle-track { background: var(--blue) !important; }
  /* Table hover */
  tbody tr:hover { background: rgba(37,99,235,0.05) !important; }
  /* TOTP progress fill */
  .totp-ring-fg { stroke: var(--blue2) !important; }
  /* Stat cards */
  .stat-val { color: var(--blue3) !important; }
  /* pk-icon */
  .pk-icon, .dev-icon, .method-icon {
    background: rgba(37,99,235,0.10) !important;
    border-color: rgba(37,99,235,0.22) !important;
    color: var(--blue3) !important;
  }
  /* Badge status on */
  .badge-status.on, .badge-on, .badge-online {
    background: rgba(16,185,129,0.09) !important;
    border-color: rgba(16,185,129,0.20) !important;
    color: #6ee7b7 !important;
  }
  .badge-status.off {
    background: rgba(37,99,235,0.10) !important;
    border-color: rgba(37,99,235,0.22) !important;
    color: var(--blue3) !important;
  }
  /* email badge */
  .email-badge {
    background: rgba(37,99,235,0.10) !important;
    border-color: rgba(37,99,235,0.22) !important;
    color: var(--blue3) !important;
  }
  /* method badge in setup_2fa */
  .method-badge {
    border-color: rgba(37,99,235,0.28) !important;
  }
  .badge-icon {
    background: rgba(37,99,235,0.12) !important;
    border-color: rgba(37,99,235,0.28) !important;
    color: var(--blue2) !important;
  }
  /* Confirm box */
  .confirm-box, .disable-confirm {
    border-color: rgba(37,99,235,0.22) !important;
  }
  /* ip badge */
  .ip-badge {
    background: rgba(37,99,235,0.08) !important;
    border-color: rgba(37,99,235,0.16) !important;
    color: var(--blue3) !important;
  }
  /* expiry badge */
  .expiry { border-color: rgba(245,158,11,0.18) !important; }
  /* alert info */
  .alert-info, .msg-info, .msg-warning {
    background: rgba(37,99,235,0.08) !important;
    border-color: rgba(37,99,235,0.20) !important;
    color: var(--blue3) !important;
  }
  /* secret chip */
  .secret-chip {
    color: var(--blue3) !important;
    border-color: rgba(37,99,235,0.20) !important;
  }
  .secret-chip:hover { border-color: rgba(37,99,235,0.40) !important; }
  /* btn-purple → blue style */
  .btn-purple {
    background: rgba(37,99,235,0.12) !important;
    border-color: rgba(37,99,235,0.28) !important;
    color: var(--blue3) !important;
  }
  .btn-purple:hover:not(:disabled) {
    background: rgba(37,99,235,0.20) !important;
  }
  /* TOTP bar fill */
  #totp-fill, .totp-bar { background: var(--blue2) !important; }
  /* Panel hint bar */
  .panel-hint { color: var(--blue3) !important; }
  .panel-hint i { color: var(--blue2) !important; }
  /* list-title icon */
  .list-title i { color: var(--blue3) !important; }
  /* page-title area */
  .icon-wrap {
    background: rgba(37,99,235,0.10) !important;
    border-color: rgba(37,99,235,0.24) !important;
  }
  /* thead */
  thead tr { background: rgba(8,15,28,0.8) !important; }
  /* smooth all transitions */
  *, *::before, *::after { transition-timing-function: cubic-bezier(0.4,0,0.2,1); }

</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">HUIT<strong>.auth</strong></div>
  </div>

  <div class="steps">
    <div class="step done">
      <div class="step-n"><i class="fa fa-check" style="font-size:10px"></i></div>
      <div class="step-label">Thông tin</div>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-n">2</div>
      <div class="step-label">OTP</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-n">3</div>
      <div class="step-label">Hoàn tất</div>
    </div>
  </div>

  <div class="icon-wrap">📬</div>
  <h2>Xác nhận Email</h2>
  <p class="sub">Mã OTP 6 số đã được gửi đến</p>
  <div class="email-badge"><i class="fa fa-envelope"></i> {{ email }}</div>
  <br>
  <div class="expiry"><i class="fa fa-clock"></i> Hiệu lực <strong>10 phút</strong></div>

  {% if messages %}
    {% for message in messages %}
    <div class="msg {% if 'success' in message.tags %}msg-success{% else %}msg-error{% endif %}">
      <i class="fas {% if 'success' in message.tags %}fa-check-circle{% else %}fa-circle-xmark{% endif %}"></i>
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}

  <form method="POST" id="otp-form">
    {% csrf_token %}
    <div class="otp-row">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
    </div>
    <input type="hidden" name="otp_code" id="hidden-otp">
    <button type="submit" class="btn btn-primary" id="confirm-btn" disabled>
      <i class="fa fa-shield-halved"></i> Xác nhận & Kích hoạt
    </button>
  </form>

  <form method="POST" style="margin-top:8px;">
    {% csrf_token %}
    <input type="hidden" name="action" value="resend">
    <button type="submit" class="btn btn-ghost" id="resend-btn" disabled>
      <i class="fa fa-rotate-right"></i> Gửi lại mã OTP
    </button>
  </form>

  <div class="countdown" id="countdown">
    Gửi lại sau: <span class="timer" id="timer">600</span>s
  </div>

  <a href="/register/" class="back"><i class="fa fa-arrow-left"></i> Quay lại đăng ký</a>
</div>

<script>
const boxes=[...document.querySelectorAll('.otp-box')];
const hidden=document.getElementById('hidden-otp');
const confirmBtn=document.getElementById('confirm-btn');

boxes.forEach((box,i)=>{
  box.addEventListener('input',()=>{
    box.value=box.value.replace(/\D/g,'').slice(-1);
    box.classList.toggle('filled',!!box.value);
    sync();
    if(box.value&&i<5)boxes[i+1].focus();
  });
  box.addEventListener('keydown',e=>{
    if(e.key==='Backspace'&&!box.value&&i>0){
      boxes[i-1].value='';boxes[i-1].classList.remove('filled');
      boxes[i-1].focus();sync();
    }
  });
  box.addEventListener('paste',e=>{
    e.preventDefault();
    const p=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
    [...p.slice(0,6)].forEach((c,j)=>{if(boxes[j]){boxes[j].value=c;boxes[j].classList.add('filled');}});
    sync();boxes[Math.min(p.length,5)].focus();
  });
});
function sync(){
  let v='';boxes.forEach(b=>v+=b.value);
  hidden.value=v;confirmBtn.disabled=v.length<6;
}
boxes[0].focus();

let t=600;
const timerEl=document.getElementById('timer');
const cd=document.getElementById('countdown');
const resend=document.getElementById('resend-btn');
const tick=setInterval(()=>{
  t--;timerEl.textContent=t;
  if(t<=120)cd.classList.add('warning');
  if(t<=0){
    clearInterval(tick);cd.classList.add('expired');
    cd.innerHTML='<span class="timer"><i class="fa fa-times-circle"></i> Mã đã hết hạn</span>';
    resend.disabled=false;confirmBtn.disabled=true;
  }
},1000);
setTimeout(()=>{resend.disabled=false;},15000);
</script>
</body>
</html>
