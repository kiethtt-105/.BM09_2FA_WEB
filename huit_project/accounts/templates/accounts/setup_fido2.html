<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết lập FIDO2 / Passkey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center">
        <div class="mx-auto w-20 h-20 bg-violet-600 rounded-3xl flex items-center justify-center text-white text-5xl mb-6">
            🔐
        </div>
        <h2 class="text-3xl font-black text-slate-800 mb-2">Thiết lập Passkey</h2>
        <p class="text-slate-500 mb-8">Sử dụng vân tay, khuôn mặt hoặc khóa bảo mật thiết bị</p>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-6 p-4 rounded-2xl text-sm bg-violet-50 text-violet-700">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <button type="submit"
                    class="w-full py-5 bg-violet-600 hover:bg-violet-700 text-white font-bold text-lg rounded-3xl flex items-center justify-center gap-3 transition">
                <i class="fas fa-fingerprint"></i>
                ĐĂNG KÝ PASSKEY NGAY
            </button>
        </form>

        <a href="{% url 'dashboard' %}" class="mt-8 block text-slate-400 hover:text-slate-600">
            ← Quay về Dashboard
        </a>
    </div>
</body>
</html>
