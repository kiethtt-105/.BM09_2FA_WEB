<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác minh 2FA · HUIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
{# ════ KHÔNG CÒN: <script src="https://unpkg.com/@simplewebauthn/browser/..."> ════ #}
{# Thay bằng WebAuthn Credentials API native của browser — 100% tự code #}
<style>
:root {
  --bg:#080c14; --surface:#0f1623; --surface2:#161e2e;
  --border:rgba(255,255,255,0.07);
  --accent:#6366f1; --accent2:#22d3ee;
  --green:#10b981; --amber:#f59e0b; --red:#ef4444; --purple:#a855f7;
  --text:#e2e8f0; --muted:#64748b;
  --font:'Outfit',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);background:var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:var(--text);padding:24px;
}
body::before{
  content:'';position:fixed;border-radius:50%;width:700px;height:700px;
  background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 70%);
  top:-200px;left:-200px;pointer-events:none;z-index:0;
}
.card{
  position:relative;z-index:1;width:100%;max-width:460px;
  background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:44px 36px;
  box-shadow:0 0 0 1px rgba(99,102,241,.08),0 40px 80px rgba(0,0,0,.5);
  animation:rise .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise{
  from{opacity:0;transform:scale(.93) translateY(20px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.header{text-align:center;margin-bottom:28px;}
.shield-icon{
  width:68px;height:68px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--accent),#818cf8);
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:28px;box-shadow:0 8px 24px rgba(99,102,241,.35);
  animation:glow 2.5s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{box-shadow:0 8px 24px rgba(99,102,241,.35);}
  50%{box-shadow:0 8px 40px rgba(99,102,241,.6);}
}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.header p{font-size:13px;color:var(--muted);}

.msg{padding:10px 14px;border-radius:10px;font-size:13px;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.msg-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;}
.msg-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.msg-info{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;}

/* Method tabs */
.method-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:8px;margin-bottom:24px;
}
.method-card{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:12px 8px;border-radius:14px;border:2px solid var(--border);
  background:var(--surface2);text-decoration:none;color:var(--muted);
  transition:all .2s;cursor:pointer;
}
.method-card:hover{border-color:rgba(255,255,255,.15);color:var(--text);}
.method-card.active-app   {border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.08);}
.method-card.active-email {border-color:var(--green); color:var(--green); background:rgba(16,185,129,.08);}
.method-card.active-hotp  {border-color:var(--amber); color:var(--amber); background:rgba(245,158,11,.08);}
.method-card.active-fido2 {border-color:var(--purple);color:var(--purple);background:rgba(168,85,247,.08);}
.method-card.active-push  {border-color:var(--amber); color:var(--amber); background:rgba(245,158,11,.08);}
.method-icon{font-size:22px;}
.method-label{font-size:11px;font-weight:700;font-family:var(--mono);text-align:center;}
.method-sub{font-size:10px;opacity:.7;text-align:center;}

.method-hint{
  text-align:center;font-size:12px;color:var(--muted);
  font-family:var(--mono);margin-bottom:16px;
  padding:8px 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;
}

/* OTP boxes */
.otp-row{display:flex;justify-content:center;gap:10px;margin:18px 0;}
.otp-box{
  width:50px;height:60px;background:var(--surface2);
  border:2px solid var(--border);border-radius:14px;
  font-size:1.7rem;font-weight:700;font-family:var(--mono);
  text-align:center;color:var(--text);outline:none;
  transition:border .2s,box-shadow .2s,background .2s;
}
.otp-box:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(99,102,241,.15);background:rgba(99,102,241,.05);}
.otp-box.filled{border-color:rgba(99,102,241,.4);}

/* Buttons */
.btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  font-size:14px;font-weight:700;font-family:var(--font);
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;margin-bottom:10px;
  transition:transform .15s,box-shadow .15s;
}
.btn:last-child{margin-bottom:0;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-primary{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border:1px solid rgba(255,255,255,.1);color:var(--text);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.btn-green {background:linear-gradient(135deg,var(--green),#059669);color:#fff;box-shadow:0 4px 20px rgba(16,185,129,.3);}
.btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;box-shadow:0 4px 20px rgba(168,85,247,.3);}
.btn-amber {background:linear-gradient(135deg,var(--amber),#d97706); color:#fff;box-shadow:0 4px 20px rgba(245,158,11,.3);}
.btn-ghost {background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:13px;}
.btn-ghost:hover:not(:disabled){border-color:rgba(255,255,255,.15);color:var(--text);}

.divider{height:1px;background:var(--border);margin:16px 0;}
.resend-row{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:12px;}
.resend-btn{
  background:none;border:none;cursor:pointer;color:var(--green);
  font-size:13px;font-family:var(--font);font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
}
.resend-btn:disabled{color:var(--muted);cursor:not-allowed;}
.countdown-row{font-size:11px;color:var(--muted);font-family:var(--mono);display:none;}
.countdown-row .ct{color:var(--green);font-weight:700;}

/* FIDO2 */
.fido2-status{
  font-size:13px;margin-top:12px;min-height:20px;text-align:center;
  padding:8px;border-radius:8px;transition:all .3s;
}
.fido2-status.ok  {color:var(--green);background:rgba(16,185,129,.1);}
.fido2-status.err {color:var(--red);  background:rgba(239,68,68,.1);}
.fido2-status.info{color:var(--muted);}

/* HOTP code display */
.hotp-code-display{
  display:none;margin-top:12px;text-align:center;
  font-family:var(--mono);font-size:2rem;font-weight:700;
  letter-spacing:8px;color:var(--amber);
  background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);
  border-radius:12px;padding:12px;
}

/* Push auth */
.push-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:16px;padding:20px;text-align:center;margin-top:16px;
}
.push-spinner{
  width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--amber);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.push-status-text{font-size:13px;color:var(--muted);margin-top:8px;}
.push-approved{color:var(--green);font-weight:700;}
.push-denied{color:var(--red);font-weight:700;}

.device-list{margin:12px 0;}
.device-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;margin-bottom:8px;
  font-size:12px;color:var(--muted);
}
.device-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  animation:blink 1.5s infinite;flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="shield-icon">🛡️</div>
    <h1>Xác minh 2 lớp</h1>
    <p>Xác thực để tiếp tục đăng nhập</p>
  </div>

  {% if messages %}
    {% for message in messages %}
    <div class="msg {% if 'success' in message.tags %}msg-success{% elif 'error' in message.tags %}msg-error{% else %}msg-info{% endif %}">
      <i class="fas {% if 'success' in message.tags %}fa-check-circle{% elif 'error' in message.tags %}fa-circle-xmark{% else %}fa-info-circle{% endif %}"></i>
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}

  <!-- Method tabs — chỉ hiện method user đã bật -->
  <div class="method-grid">
    {% for m in methods %}
    <a href="?method={{ m.key }}" class="method-card {% if method == m.key %}active-{{ m.key }}{% endif %}">
      <div class="method-icon">{{ m.icon }}</div>
      <div class="method-label">{{ m.name }}</div>
      <div class="method-sub">
        {% if m.key == 'app' %}Google Auth
        {% elif m.key == 'email' %}Nhận qua mail
        {% elif m.key == 'hotp' %}Mã sự kiện
        {% elif m.key == 'fido2' %}Vân tay/Face
        {% elif m.key == 'push' %}Thiết bị khác
        {% endif %}
      </div>
    </a>
    {% endfor %}
  </div>

  <!-- Hint -->
  <div class="method-hint">
    {% if method == 'app' %}<i class="fas fa-mobile-screen-button"></i> Nhập mã từ Google Authenticator
    {% elif method == 'email' %}<i class="fas fa-envelope"></i> Nhập mã OTP gửi qua email
    {% elif method == 'hotp' %}<i class="fas fa-hashtag"></i> Nhấn nút để sinh mã HOTP từ ứng dụng
    {% elif method == 'fido2' %}<i class="fas fa-fingerprint"></i> Xác thực bằng vân tay / khuôn mặt / hardware key
    {% elif method == 'push' %}<i class="fas fa-bell"></i> Gửi yêu cầu đến thiết bị đang online
    {% endif %}
  </div>

  <!-- ══ APP / EMAIL / HOTP ══ -->
  {% if method == 'app' or method == 'email' or method == 'hotp' %}
  <form method="POST" id="otp-form">
    {% csrf_token %}
    <div class="otp-row">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
    </div>
    <input type="hidden" name="otp_code" id="hidden-otp" required>
    <button type="submit" class="btn btn-primary" id="confirm-btn" disabled>
      <i class="fas fa-lock-open"></i> Xác nhận & Đăng nhập
    </button>
  </form>

  {% if method == 'hotp' %}
  <div class="divider"></div>
  <button onclick="generateHOTP()" id="gen-hotp-btn" class="btn btn-amber">
    <i class="fas fa-rotate-right"></i>
    <span id="gen-hotp-text">Sinh mã HOTP mới</span>
  </button>
  <div id="hotp-code-display" class="hotp-code-display"></div>
  <div style="margin-top:8px;font-size:11px;color:var(--muted);text-align:center;font-family:var(--mono);">
    Mỗi lần bấm sinh 1 mã mới — dùng 1 lần rồi hết hiệu lực
  </div>
  {% endif %}

  {% if method == 'email' %}
  <div class="divider"></div>
  <button onclick="sendEmailOTP()" id="send-btn" class="btn btn-green">
    <i class="fas fa-paper-plane"></i>
    <span id="send-text">Gửi mã OTP về Email</span>
  </button>
  <div class="resend-row">
    <button id="resend-btn" onclick="resendOTP()" class="resend-btn" disabled>
      <i class="fas fa-rotate-right"></i>
      <span id="resend-text">Gửi lại mã</span>
    </button>
    <div class="countdown-row" id="countdown-container">
      Gửi lại sau: <span class="ct" id="timer">180</span>s
    </div>
  </div>
  {% endif %}
  {% endif %}

  <!-- ══ FIDO2 — WebAuthn Credentials API native (không dùng thư viện ngoài) ══ -->
  {% if method == 'fido2' %}
  <button id="btn-fido2" onclick="startPasskeyAuth()" class="btn btn-purple">
    <i class="fas fa-fingerprint"></i> Xác thực bằng Passkey
  </button>
  <div id="fido2-status" class="fido2-status info"></div>
  {% endif %}

  <!-- ══ PUSH ══ -->
  {% if method == 'push' %}
  <div id="push-idle">
    <p style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px;">
      Gửi thông báo đến thiết bị đang online để xác nhận đăng nhập.
    </p>

    {% if other_devices_list %}
    <div class="device-list">
      {% for d in other_devices_list %}
      <div class="device-item">
        <div class="device-dot"></div>
        <div>
          <div style="color:var(--text);font-weight:600;">{{ d.name|default:"Thiết bị không xác định" }}</div>
          <div>{{ d.ip_address }} · {{ d.last_seen|timesince }} trước</div>
        </div>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <button onclick="sendPushRequest()" id="btn-push" class="btn btn-amber">
      <i class="fas fa-paper-plane"></i> Gửi yêu cầu xác nhận
    </button>
  </div>

  <div id="push-waiting" style="display:none;">
    <div class="push-box">
      <div class="push-spinner"></div>
      <div style="font-size:14px;font-weight:700;color:var(--amber);">Đang chờ xác nhận...</div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px;">
        Mở thiết bị đang online và bấm <strong style="color:var(--text);">Cho phép</strong>
      </div>
      <div id="push-status-text" class="push-status-text">Đang kiểm tra...</div>
    </div>
    <button onclick="cancelPush()" class="btn btn-ghost" style="margin-top:12px;">
      <i class="fas fa-xmark"></i> Hủy
    </button>
  </div>

  <form id="push-form" method="POST" style="display:none">
    {% csrf_token %}
    <input type="hidden" name="action" value="send_push_request">
  </form>
  {% endif %}

</div>

<script>
// ══ OTP BOXES ══════════════════════════════════════════════════════════════
const boxes      = document.querySelectorAll('.otp-box');
const hidden     = document.getElementById('hidden-otp');
const confirmBtn = document.getElementById('confirm-btn');

boxes.forEach((box, idx) => {
  box.addEventListener('input', () => {
    box.value = box.value.replace(/\D/g, '').slice(-1);
    box.classList.toggle('filled', !!box.value);
    let otp = ''; boxes.forEach(b => otp += b.value);
    if (hidden) hidden.value = otp;
    if (confirmBtn) confirmBtn.disabled = otp.length < 6;
    if (box.value && idx < 5) boxes[idx + 1].focus();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && idx > 0) {
      boxes[idx - 1].value = ''; boxes[idx - 1].classList.remove('filled'); boxes[idx - 1].focus();
    }
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const p = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    [...p.slice(0, 6)].forEach((ch, i) => {
      if (boxes[i]) { boxes[i].value = ch; boxes[i].classList.add('filled'); }
    });
    let otp = ''; boxes.forEach(b => otp += b.value);
    if (hidden) hidden.value = otp;
    if (confirmBtn) confirmBtn.disabled = otp.length < 6;
    boxes[Math.min(p.length, 5)].focus();
  });
});
if (boxes.length) boxes[0].focus();

// ══ HOTP ═════════════════════════════════════════════════════════════════
async function generateHOTP() {
  const btn  = document.getElementById('gen-hotp-btn');
  const txt  = document.getElementById('gen-hotp-text');
  const disp = document.getElementById('hotp-code-display');
  if (btn) btn.disabled = true;
  if (txt) txt.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang sinh mã...';

  try {
    const resp = await fetch('{% url "generate_hotp_code" %}', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
    });
    const data = await resp.json();
    if (data.status === 'ok' && data.code) {
      if (disp) { disp.style.display = 'block'; disp.textContent = data.code; }
      // Auto-fill vào ô OTP
      const bs = document.querySelectorAll('.otp-box');
      [...data.code].forEach((ch, i) => {
        if (bs[i]) { bs[i].value = ch; bs[i].classList.add('filled'); }
      });
      let otp = ''; bs.forEach(b => otp += b.value);
      const h = document.getElementById('hidden-otp');
      if (h) h.value = otp;
      const cb = document.getElementById('confirm-btn');
      if (cb) cb.disabled = otp.length < 6;
    } else {
      alert(data.message || 'Lỗi sinh mã HOTP');
    }
  } catch (e) {
    alert('Lỗi kết nối: ' + e.message);
  } finally {
    if (btn) btn.disabled = false;
    if (txt) txt.innerHTML = 'Sinh mã HOTP mới';
  }
}

// ══ EMAIL OTP ═════════════════════════════════════════════════════════════
function sendEmailOTP() {
  const btn = document.getElementById('send-btn');
  const txt = document.getElementById('send-text');
  if (btn) btn.disabled = true;
  if (txt) txt.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi...';
  _submitAction('send_email_code');
}
function resendOTP() {
  const btn = document.getElementById('resend-btn');
  if (btn) btn.disabled = true;
  _submitAction('send_email_code');
}
function _submitAction(action) {
  const f    = document.createElement('form');
  f.method   = 'POST'; f.style.display = 'none';
  const csrf = document.createElement('input');
  csrf.type = 'hidden'; csrf.name = 'csrfmiddlewaretoken'; csrf.value = '{{ csrf_token }}';
  f.appendChild(csrf);
  const act  = document.createElement('input');
  act.type   = 'hidden'; act.name = 'action'; act.value = action;
  f.appendChild(act);
  document.body.appendChild(f); f.submit();
}

// ══ COUNTDOWN ════════════════════════════════════════════════════════════
function startCountdown() {
  const cd   = document.getElementById('countdown-container');
  const tel  = document.getElementById('timer');
  const rbtn = document.getElementById('resend-btn');
  const rtxt = document.getElementById('resend-text');
  if (!cd) return;
  cd.style.display = 'block';
  if (rbtn) rbtn.disabled = true;
  if (rtxt) rtxt.textContent = 'Đang chờ...';
  let timeLeft = 180;
  const tick = setInterval(() => {
    timeLeft--;
    if (tel) tel.textContent = timeLeft;
    if (timeLeft <= 30 && tel) tel.style.color = 'var(--red)';
    if (timeLeft <= 0) {
      clearInterval(tick);
      cd.style.display = 'none';
      if (rbtn) rbtn.disabled = false;
      if (rtxt) rtxt.textContent = 'Gửi lại mã';
    }
  }, 1000);
}

// ══ FIDO2 / PASSKEY AUTHENTICATION — WebAuthn Credentials API native ══════
// KHÔNG dùng @simplewebauthn/browser — tự implement theo W3C WebAuthn spec.
// Tham chiếu: https://www.w3.org/TR/webauthn-2/

/**
 * base64url → ArrayBuffer
 */
function b64urlToBuffer(b64url) {
  const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
  const padded = b64.padEnd(b64.length + (4 - b64.length % 4) % 4, '=');
  const binary = atob(padded);
  const buf = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
  return buf.buffer;
}

/**
 * ArrayBuffer / Uint8Array → base64url (không padding)
 */
function bufferToB64url(buffer) {
  const bytes = buffer instanceof ArrayBuffer ? new Uint8Array(buffer) : buffer;
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

/**
 * Chuẩn hoá PublicKeyCredentialRequestOptions từ server:
 *   - challenge: string → ArrayBuffer
 *   - allowCredentials[].id: string → ArrayBuffer
 */
function prepareRequestOptions(opts) {
  return {
    ...opts,
    challenge: b64urlToBuffer(opts.challenge),
    allowCredentials: (opts.allowCredentials || []).map(c => ({
      ...c,
      id: b64urlToBuffer(c.id),
    })),
  };
}

/**
 * Chuyển PublicKeyCredential (authentication) response → JSON để gửi server.
 */
function assertionToJSON(credential) {
  return {
    id:   credential.id,
    type: credential.type,
    rawId: bufferToB64url(credential.rawId),
    response: {
      clientDataJSON:    bufferToB64url(credential.response.clientDataJSON),
      authenticatorData: bufferToB64url(credential.response.authenticatorData),
      signature:         bufferToB64url(credential.response.signature),
      userHandle:        credential.response.userHandle
                           ? bufferToB64url(credential.response.userHandle)
                           : null,
    },
  };
}

async function startPasskeyAuth() {
  const btn    = document.getElementById('btn-fido2');
  const status = document.getElementById('fido2-status');

  // Kiểm tra browser hỗ trợ WebAuthn
  if (!window.PublicKeyCredential) {
    _setStatus(status, 'Trình duyệt này không hỗ trợ WebAuthn / Passkey.', 'err');
    return;
  }

  try {
    if (btn) btn.disabled = true;
    _setStatus(status, 'Đang khởi tạo...', 'info');

    // Bước 1: Lấy challenge từ server
    const resp = await fetch('{% url "fido2_auth_begin" %}');
    if (!resp.ok) throw new Error(`Server trả HTTP ${resp.status}`);
    const opts = await resp.json();
    if (opts.status === 'error') throw new Error(opts.message);

    // Bước 2: Chuẩn bị options — chuyển string → ArrayBuffer
    const requestOptions = prepareRequestOptions(opts);

    _setStatus(status, 'Vui lòng xác nhận trên thiết bị (vân tay / khuôn mặt / PIN)...', 'info');

    // Bước 3: Gọi WebAuthn Credentials API native
    const credential = await navigator.credentials.get({ publicKey: requestOptions });

    _setStatus(status, 'Đang xác thực...', 'info');

    // Bước 4: Chuyển response → JSON, gửi lên server
    const payload = assertionToJSON(credential);
    const vResp = await fetch('{% url "fido2_auth_complete" %}', {
      method:  'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken':  '{{ csrf_token }}',
      },
      body: JSON.stringify(payload),
    });
    const result = await vResp.json();

    if (result.status === 'success') {
      _setStatus(status, '✅ Xác thực thành công! Đang chuyển hướng...', 'ok');
      setTimeout(() => { window.location.href = result.redirect || '/dashboard/'; }, 1000);
    } else {
      throw new Error(result.message || 'Xác thực thất bại');
    }

  } catch (err) {
    const msg = err.name === 'NotAllowedError'
      ? 'Bạn đã hủy hoặc hết thời gian chờ.'
      : 'Lỗi: ' + err.message;
    _setStatus(status, msg, 'err');
    if (btn) btn.disabled = false;
  }
}

function _setStatus(el, msg, type) {
  if (!el) return;
  el.textContent = msg;
  el.className = 'fido2-status ' + (type || 'info');
}

// ══ PUSH AUTH ════════════════════════════════════════════════════════════
let pushInterval = null;

function sendPushRequest() {
  document.getElementById('push-idle').style.display    = 'none';
  document.getElementById('push-waiting').style.display = 'block';
  document.getElementById('push-form').submit();
}

function cancelPush() {
  if (pushInterval) clearInterval(pushInterval);
  document.getElementById('push-waiting').style.display = 'none';
  document.getElementById('push-idle').style.display    = 'block';
}

function startPushPolling() {
  const statusEl = document.getElementById('push-status-text');
  if (!statusEl) return;
  let attempts = 0;
  pushInterval = setInterval(async () => {
    attempts++;
    try {
      const resp = await fetch('{% url "check_auth_status" %}');
      const data = await resp.json();
      if (data.status === 'approved') {
        clearInterval(pushInterval);
        statusEl.className = 'push-status-text push-approved';
        statusEl.innerText = '✅ Đã được xác nhận! Đang đăng nhập...';
        setTimeout(() => { window.location.href = data.redirect || '/dashboard/'; }, 1000);
      } else if (data.status === 'denied') {
        clearInterval(pushInterval);
        statusEl.className = 'push-status-text push-denied';
        statusEl.innerText = '❌ Yêu cầu bị từ chối.';
        setTimeout(cancelPush, 2000);
      } else {
        statusEl.innerText = 'Đang chờ xác nhận' + '.'.repeat(attempts % 4);
      }
      if (attempts >= 40) {
        clearInterval(pushInterval);
        statusEl.className = 'push-status-text push-denied';
        statusEl.innerText = '⏱ Hết thời gian chờ.';
        setTimeout(cancelPush, 2000);
      }
    } catch (e) { console.error('[Push]', e); }
  }, 3000);
}

// ══ INIT ═════════════════════════════════════════════════════════════════
window.onload = function () {
  {% if method == 'email' %} startCountdown(); {% endif %}
  {% if method == 'push' and push_request_sent %}
    document.getElementById('push-idle').style.display    = 'none';
    document.getElementById('push-waiting').style.display = 'block';
    startPushPolling();
  {% endif %}
};
</script>
