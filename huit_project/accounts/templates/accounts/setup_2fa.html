<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết lập 2FA · HUIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
{# ════ KHÔNG CÒN: <script src="https://unpkg.com/@simplewebauthn/browser/..."> ════ #}
{# Thay bằng WebAuthn Credentials API native của browser — 100% tự code #}
<style>
:root {
  --bg:#080c14; --surface:#0f1623; --surface2:#161e2e;
  --border:rgba(255,255,255,0.07);
  --accent:#6366f1; --accent2:#22d3ee;
  --green:#10b981; --amber:#f59e0b; --red:#ef4444; --purple:#a855f7;
  --text:#e2e8f0; --muted:#64748b;
  --font:'Outfit',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);background:var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:var(--text);padding:24px;
}
body::before{
  content:'';position:fixed;border-radius:50%;width:700px;height:700px;
  background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 70%);
  top:-200px;left:-200px;pointer-events:none;z-index:0;
}
.card{
  position:relative;z-index:1;width:100%;max-width:460px;
  background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:44px 36px;
  box-shadow:0 0 0 1px rgba(99,102,241,.08),0 40px 80px rgba(0,0,0,.5);
  animation:rise .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise{
  from{opacity:0;transform:scale(.93) translateY(20px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.header{text-align:center;margin-bottom:28px;}
.shield-icon{
  width:68px;height:68px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--accent),#818cf8);
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:28px;box-shadow:0 8px 24px rgba(99,102,241,.35);
  animation:glow 2.5s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{box-shadow:0 8px 24px rgba(99,102,241,.35);}
  50%{box-shadow:0 8px 40px rgba(99,102,241,.6);}
}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.header p{font-size:13px;color:var(--muted);}

.msg{padding:10px 14px;border-radius:10px;font-size:13px;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.msg-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;}
.msg-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.msg-info{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;}

/* Method tabs */
.method-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
  gap:10px;margin-bottom:24px;
}
.method-card{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 10px;border-radius:14px;border:2px solid var(--border);
  background:var(--surface2);text-decoration:none;color:var(--muted);
  transition:all .2s;cursor:pointer;
}
.method-card:hover{border-color:rgba(255,255,255,.15);color:var(--text);}
.method-card.active-app   {border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.08);}
.method-card.active-email {border-color:var(--green); color:var(--green); background:rgba(16,185,129,.08);}
.method-card.active-hotp  {border-color:var(--amber); color:var(--amber); background:rgba(245,158,11,.08);}
.method-card.active-fido2 {border-color:var(--purple);color:var(--purple);background:rgba(168,85,247,.08);}
.method-icon{font-size:24px;}
.method-label{font-size:11px;font-weight:700;font-family:var(--mono);text-align:center;}
.method-sub{font-size:10px;opacity:.7;text-align:center;}

.method-hint{
  text-align:center;font-size:12px;color:var(--muted);
  font-family:var(--mono);margin-bottom:16px;
  padding:8px 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;
}

/* OTP boxes */
.otp-row{display:flex;justify-content:center;gap:10px;margin:18px 0;}
.otp-box{
  width:52px;height:62px;background:var(--surface2);
  border:2px solid var(--border);border-radius:14px;
  font-size:1.8rem;font-weight:700;font-family:var(--mono);
  text-align:center;color:var(--text);outline:none;
  transition:border .2s,box-shadow .2s,background .2s;
}
.otp-box:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(99,102,241,.15);background:rgba(99,102,241,.05);}
.otp-box.filled{border-color:rgba(99,102,241,.4);}

/* Buttons */
.btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  font-size:14px;font-weight:700;font-family:var(--font);
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;margin-bottom:10px;
  transition:transform .15s,box-shadow .15s;
}
.btn:last-child{margin-bottom:0;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-indigo{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.3);}
.btn-green {background:linear-gradient(135deg,var(--green),#059669);color:#fff;box-shadow:0 4px 20px rgba(16,185,129,.3);}
.btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;box-shadow:0 4px 20px rgba(168,85,247,.3);}
.btn-amber {background:linear-gradient(135deg,var(--amber),#d97706); color:#fff;box-shadow:0 4px 20px rgba(245,158,11,.3);}
.btn-ghost {background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:13px;}
.btn-ghost:hover:not(:disabled){border-color:rgba(255,255,255,.15);color:var(--text);}

.divider{height:1px;background:var(--border);margin:16px 0;}
.resend-row{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:12px;}
.resend-btn{
  background:none;border:none;cursor:pointer;color:var(--green);
  font-size:13px;font-family:var(--font);font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
}
.resend-btn:disabled{color:var(--muted);cursor:not-allowed;}
.countdown-row{font-size:11px;color:var(--muted);font-family:var(--mono);display:none;}
.countdown-row .ct{color:var(--green);font-weight:700;}

/* FIDO2 */
.fido2-status{
  font-size:13px;margin-top:12px;min-height:20px;text-align:center;
  padding:8px;border-radius:8px;transition:all .3s;
}
.fido2-status.ok  {color:var(--green);background:rgba(16,185,129,.1);}
.fido2-status.err {color:var(--red);  background:rgba(239,68,68,.1);}
.fido2-status.info{color:var(--muted);}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="shield-icon">🛡️</div>
    {% if method in 'email,app,hotp,fido2' and method %}
      <h1>
        {% if method == 'email' %}📧 Email OTP
        {% elif method == 'app' %}📱 TOTP
        {% elif method == 'hotp' %}🔢 HOTP
        {% elif method == 'fido2' %}🔑 Passkey
        {% endif %}
      </h1>
      <p>
        {% if method == 'app' %}Quét QR bằng Google Authenticator → nhập mã để kích hoạt
        {% elif method == 'email' %}Nhấn gửi OTP → nhập mã 6 số từ email để kích hoạt
        {% elif method == 'hotp' %}Quét QR bằng Aegis / andOTP → bấm sinh mã → nhập để kích hoạt
        {% elif method == 'fido2' %}Dùng vân tay / khuôn mặt / hardware key để đăng ký Passkey
        {% endif %}
      </p>
    {% else %}
      <h1>Thiết lập 2FA</h1>
      <p>Chọn phương thức bảo mật phù hợp với bạn</p>
    {% endif %}
  </div>

  {% if messages %}
    {% for message in messages %}
    <div class="msg {% if 'success' in message.tags %}msg-success{% elif 'error' in message.tags %}msg-error{% else %}msg-info{% endif %}">
      <i class="fas {% if 'success' in message.tags %}fa-check-circle{% elif 'error' in message.tags %}fa-circle-xmark{% else %}fa-info-circle{% endif %}"></i>
      {{ message }}
    </div>
    {% endfor %}
  {% endif %}

  {# ══ PICKER — chỉ hiện khi chưa chọn method (hoặc method không hợp lệ) ══ #}
  {% if not method or method not in 'email,app,hotp,fido2' %}
  <div class="method-grid">
    {% if not already_enabled.email %}
    <a href="?method=email" class="method-card">
      <div class="method-icon">📧</div>
      <div class="method-label">Email OTP</div>
      <div class="method-sub">Nhận qua mail</div>
    </a>
    {% endif %}
    {% if not already_enabled.app %}
    <a href="?method=app" class="method-card">
      <div class="method-icon">📱</div>
      <div class="method-label">TOTP</div>
      <div class="method-sub">Google Auth</div>
    </a>
    {% endif %}
    {% if not already_enabled.hotp %}
    <a href="?method=hotp" class="method-card">
      <div class="method-icon">🔢</div>
      <div class="method-label">HOTP</div>
      <div class="method-sub">Mã sự kiện</div>
    </a>
    {% endif %}
    {% if not already_enabled.fido2 %}
    <a href="?method=fido2" class="method-card">
      <div class="method-icon">🔑</div>
      <div class="method-label">Passkey</div>
      <div class="method-sub">FIDO2/WebAuthn</div>
    </a>
    {% endif %}
  </div>

  {% else %}
  {# ══ METHOD DETAIL — chỉ hiện method được chọn ══ #}

  <!-- QR CODE — TOTP hoặc HOTP -->
  {% if qr_code_base64 %}
  <div style="text-align:center;margin-bottom:20px;">
    <img src="data:image/png;base64,{{ qr_code_base64 }}"
         style="width:180px;height:180px;border-radius:12px;border:2px solid rgba(245,158,11,.35);display:inline-block;">
    {% if otp_secret %}
    <div style="margin-top:10px;font-size:11px;color:var(--muted);font-family:var(--mono);">
      Secret: <span style="color:var(--text);letter-spacing:1px;user-select:all;">{{ otp_secret }}</span>
    </div>
    {% endif %}
  </div>
  {% endif %}

  <!-- EMAIL / TOTP / HOTP — OTP form -->
  {% if method == 'email' or method == 'app' or method == 'hotp' %}

  {% if method == 'hotp' %}
  <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#fcd34d;display:flex;align-items:center;gap:8px;">
    <i class="fas fa-bolt" style="flex-shrink:0;font-size:14px;"></i>
    <span>Sau khi quét QR, mở <strong>Aegis / andOTP</strong> → bấm sinh mã HOTP → nhập mã 6 số bên dưới.</span>
  </div>
  {% endif %}

  <form method="POST" id="otp-form">
    {% csrf_token %}
    <input type="hidden" name="{% if method == 'email' %}verify_email_otp{% elif method == 'app' %}verify_app_otp{% else %}verify_hotp_otp{% endif %}" value="1">
    {% if setup_token %}<input type="hidden" name="setup_token" value="{{ setup_token }}">{% endif %}
    <div class="otp-row">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
      <input class="otp-box" type="text" maxlength="1" autocomplete="off" inputmode="numeric">
    </div>
    <input type="hidden" name="otp_code" id="hidden-otp" required>
    <button type="submit" class="btn {% if method == 'hotp' %}btn-amber{% elif method == 'app' %}btn-indigo{% else %}btn-green{% endif %}" id="confirm-btn" disabled>
      <i class="fas fa-check-circle"></i>
      {% if method == 'hotp' %}Xác nhận kích hoạt HOTP
      {% elif method == 'app' %}Xác nhận kích hoạt TOTP
      {% else %}Xác nhận kích hoạt Email OTP{% endif %}
    </button>
  </form>

  {% if method == 'email' %}
  <div class="divider"></div>
  <form method="POST" id="send-form">
    {% csrf_token %}
    <input type="hidden" name="send_email_otp" value="1">
    <button type="submit" class="btn btn-green" id="send-btn">
      <i class="fas fa-paper-plane"></i>
      <span id="send-text">Gửi mã OTP về Email</span>
    </button>
  </form>
  <div class="resend-row">
    <button id="resend-btn" onclick="resendOTP()" class="resend-btn" disabled>
      <i class="fas fa-rotate-right"></i>
      <span id="resend-text">Gửi lại mã</span>
    </button>
    <div class="countdown-row" id="countdown-container">
      Gửi lại sau: <span class="ct" id="timer">180</span>s
    </div>
  </div>
  {% endif %}
  {% endif %}

  <!-- FIDO2 — WebAuthn API native -->
  {% if method == 'fido2' %}
  <button id="btn-fido2-reg" onclick="startPasskeyRegistration()" class="btn btn-purple">
    <i class="fas fa-fingerprint"></i> Đăng ký Passkey mới
  </button>
  <div id="fido2-status" class="fido2-status info"></div>

  <div class="divider"></div>
  <a href="{% url 'manage_passkeys' %}" class="btn btn-ghost">
    <i class="fas fa-list"></i> Xem các Passkey đã đăng ký
  </a>
  {% endif %}

  <!-- Nút quay lại picker -->
  <div class="divider"></div>
  <a href="{% url 'setup_2fa' %}" class="btn btn-ghost">
    <i class="fas fa-arrow-left"></i> Chọn phương thức khác
  </a>

  {% endif %}{# end method detail #}

</div>

<script>
// ══ OTP BOXES ══════════════════════════════════════════════════════════════
const boxes      = document.querySelectorAll('.otp-box');
const hidden     = document.getElementById('hidden-otp');
const confirmBtn = document.getElementById('confirm-btn');

boxes.forEach((box, idx) => {
  box.addEventListener('input', () => {
    box.value = box.value.replace(/\D/g,'').slice(-1);
    box.classList.toggle('filled', !!box.value);
    let otp = ''; boxes.forEach(b => otp += b.value);
    if (hidden) hidden.value = otp;
    if (confirmBtn) confirmBtn.disabled = otp.length < 6;
    if (box.value && idx < 5) boxes[idx + 1].focus();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && idx > 0) {
      boxes[idx - 1].value = ''; boxes[idx - 1].classList.remove('filled'); boxes[idx - 1].focus();
    }
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const p = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    [...p.slice(0, 6)].forEach((ch, i) => {
      if (boxes[i]) { boxes[i].value = ch; boxes[i].classList.add('filled'); }
    });
    let otp = ''; boxes.forEach(b => otp += b.value);
    if (hidden) hidden.value = otp;
    if (confirmBtn) confirmBtn.disabled = otp.length < 6;
    boxes[Math.min(p.length, 5)].focus();
  });
});
if (boxes.length) boxes[0].focus();

// ══ EMAIL RESEND COUNTDOWN ════════════════════════════════════════════════
function resendOTP() {
  const btn = document.getElementById('resend-btn');
  if (btn) btn.disabled = true;
  document.getElementById('send-form').submit();
}

function startCountdown() {
  const cd   = document.getElementById('countdown-container');
  const tel  = document.getElementById('timer');
  const rbtn = document.getElementById('resend-btn');
  const rtxt = document.getElementById('resend-text');
  if (!cd) return;
  cd.style.display = 'block';
  let timeLeft = 180;
  const tick = setInterval(() => {
    timeLeft--;
    if (tel) tel.textContent = timeLeft;
    if (timeLeft <= 30 && tel) tel.style.color = 'var(--red)';
    if (timeLeft <= 0) {
      clearInterval(tick);
      cd.style.display = 'none';
      if (rbtn) rbtn.disabled = false;
      if (rtxt) rtxt.textContent = 'Gửi lại mã';
    }
  }, 1000);
}

// ══ FIDO2 / PASSKEY REGISTRATION — WebAuthn Credentials API native ════════
// KHÔNG dùng @simplewebauthn/browser — tự implement theo W3C WebAuthn spec.
// Tham chiếu: https://www.w3.org/TR/webauthn-2/

/**
 * base64url → ArrayBuffer
 * Chuẩn hoá padding, thay ký tự url-safe → standard base64, rồi decode.
 */
function b64urlToBuffer(b64url) {
  const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
  const padded = b64.padEnd(b64.length + (4 - b64.length % 4) % 4, '=');
  const binary = atob(padded);
  const buf = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
  return buf.buffer;
}

/**
 * ArrayBuffer / Uint8Array → base64url (không có padding)
 * Tương đương websafe_encode() bên Python.
 */
function bufferToB64url(buffer) {
  const bytes = buffer instanceof ArrayBuffer ? new Uint8Array(buffer) : buffer;
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

/**
 * Chuẩn hoá PublicKeyCredentialCreationOptions từ server:
 *   - challenge: string → ArrayBuffer
 *   - user.id:   string → ArrayBuffer
 *   - excludeCredentials[].id: string → ArrayBuffer (nếu có)
 */
function prepareCreationOptions(opts) {
  return {
    ...opts,
    challenge: b64urlToBuffer(opts.challenge),
    user: {
      ...opts.user,
      id: b64urlToBuffer(opts.user.id),
    },
    excludeCredentials: (opts.excludeCredentials || []).map(c => ({
      ...c,
      id: b64urlToBuffer(c.id),
    })),
  };
}

/**
 * Chuyển PublicKeyCredential response thành JSON để gửi lên server.
 * Tất cả ArrayBuffer/TypedArray → base64url string.
 */
function credentialToJSON(credential) {
  return {
    id:   credential.id,
    type: credential.type,
    rawId: bufferToB64url(credential.rawId),
    response: {
      clientDataJSON:    bufferToB64url(credential.response.clientDataJSON),
      attestationObject: bufferToB64url(credential.response.attestationObject),
    },
  };
}

async function startPasskeyRegistration() {
  const btn    = document.getElementById('btn-fido2-reg');
  const status = document.getElementById('fido2-status');

  // Kiểm tra browser hỗ trợ WebAuthn
  if (!window.PublicKeyCredential) {
    _setStatus(status, 'Trình duyệt này không hỗ trợ WebAuthn / Passkey.', 'err');
    return;
  }

  try {
    btn.disabled = true;
    _setStatus(status, 'Đang khởi tạo...', 'info');

    // Bước 1: Lấy options từ server
    const resp = await fetch('{% url "fido2_reg_begin" %}');
    if (!resp.ok) throw new Error(`Server trả HTTP ${resp.status}`);
    const opts = await resp.json();
    if (opts.status === 'error') throw new Error(opts.message);

    // Bước 2: Chuẩn bị options — chuyển string → ArrayBuffer
    const creationOptions = prepareCreationOptions(opts);

    _setStatus(status, 'Vui lòng xác nhận trên thiết bị (vân tay / khuôn mặt / PIN)...', 'info');

    // Bước 3: Gọi WebAuthn Credentials API native
    const credential = await navigator.credentials.create({ publicKey: creationOptions });

    _setStatus(status, 'Đang gửi xác nhận lên server...', 'info');

    // Bước 4: Chuyển response → JSON, gửi lên server
    const payload = credentialToJSON(credential);
    const vResp = await fetch('{% url "fido2_reg_complete" %}', {
      method:  'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken':  '{{ csrf_token }}',
      },
      body: JSON.stringify(payload),
    });
    const result = await vResp.json();

    if (result.status === 'success') {
      _setStatus(status, '✅ Đăng ký Passkey thành công! Đang chuyển hướng...', 'ok');
      setTimeout(() => { window.location.href = '{% url "dashboard" %}'; }, 1200);
    } else {
      throw new Error(result.message || 'Đăng ký thất bại');
    }

  } catch (err) {
    const msg = err.name === 'NotAllowedError'
      ? 'Bạn đã hủy hoặc hết thời gian chờ.'
      : (err.name === 'InvalidStateError'
        ? 'Passkey này đã được đăng ký trước đó.'
        : 'Lỗi: ' + err.message);
    _setStatus(status, msg, 'err');
    btn.disabled = false;
  }
}

function _setStatus(el, msg, type) {
  if (!el) return;
  el.textContent = msg;
  el.className = 'fido2-status ' + (type || 'info');
}

// ══ INIT ═══════════════════════════════════════════════════════════════════
window.onload = function () {
  {% if method == 'email' and otp_sent %} startCountdown(); {% endif %}
};
</script>
</body>
</html>
